    <script>
        $(document).ready(function() {
            $('#contactForm').on('submit', function(e) {
                e.preventDefault();
                $.ajax({
                    type: 'POST',
                    url: 'send_email.php',
                    data: $(this).serialize(),
                    success: function(response) {
                        $('#formMessage').html(response);
                        $('#contactForm')[0].reset(); // Reset the form fields
                    },
                    error: function() {
                        $('#formMessage').html('There was an error sending your message.');
                    }
                });
            });
        });
    </script>
